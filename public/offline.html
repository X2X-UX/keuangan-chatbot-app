<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arunika Finance - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f4f8fc 0%, #e9f0f8 100%);
        color: #102033;
      }

      .card {
        width: min(92vw, 460px);
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid rgba(16, 32, 51, 0.1);
        box-shadow: 0 18px 36px rgba(11, 34, 63, 0.14);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.3rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #55657b;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Koneksi Internet Terputus</h1>
      <p>
        Arunika Finance sedang offline. Periksa koneksi internet Anda lalu buka ulang aplikasi.
      </p>
    </article>
  </body>
</html>
