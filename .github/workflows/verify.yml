name: Verify

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_BASE_URL: https://example.com
      TELEGRAM_BOT_TOKEN: ci-placeholder-token
      TELEGRAM_WEBHOOK_SECRET: ci-placeholder-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run preflight
        run: npm run preflight

      - name: Sync public assets
        run: npm run sync:public

      - name: Run verification suite
        run: npm run verify
